name: Render LaTeX

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y poppler-utils texlive-latex-base texlive-fonts-recommended texlive-fonts-extra texlive-latex-extra
        pip install -r requirements.txt

    - name: Run render_latex.py
      run: python scripts/render_latex.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        git add resume.pdf resume.png
        git diff --staged --quiet || git commit -m 'Render resume PDF and PNG [skip ci]'
        git push
